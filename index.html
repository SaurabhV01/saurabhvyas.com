<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saurabh Vyas</title>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #131318;
    --ink: #f4f4f6;
    --muted: #8a8a96;
    --line: #26262e;
    --accent: #6ee7b7;
    --accent-dim: rgba(110,231,183,0.12);
    --mono: 'SF Mono', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .cursor { opacity: 1 !important; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px; max-width: 120vw; max-height: 120vh;
    background: radial-gradient(circle, var(--accent-dim) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .box {
    position: relative; z-index: 1; text-align: center;
    padding: 0 28px; max-width: 620px;
  }
  .eyebrow {
    font-family: var(--mono); font-size: 1.0rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 28px;
    opacity: 0; animation: fade 0.6s ease forwards;
  }
  .eyebrow .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin-right: 10px; vertical-align: middle;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  h1 {
    font-size: clamp(2.4rem, 8vw, 4.4rem); font-weight: 800;
    letter-spacing: -0.04em; line-height: 1.05; margin-bottom: 24px;
    opacity: 0; animation: fade 0.6s ease 0.1s forwards;
  }
  h1 .hl { color: var(--accent); }
  .terminal {
    font-family: var(--mono); font-size: 0.95rem; color: var(--muted);
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 22px; text-align: left; margin: 8px auto 32px; max-width: 440px;
    opacity: 0; animation: fade 0.6s ease 0.2s forwards;
  }
  .terminal .line { white-space: nowrap; }
  .terminal .prompt { color: var(--accent); }
  .terminal .comment { color: #5a5a64; }
  .cursor {
    display: inline-block; width: 9px; height: 1.05em; background: var(--accent);
    vertical-align: text-bottom; margin-left: 3px; animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
  .sub {
    font-size: 1.1rem; color: var(--muted); margin-bottom: 32px;
    opacity: 0; animation: fade 0.6s ease 0.3s forwards;
  }
  .links {
    display: flex; gap: 22px; justify-content: center; flex-wrap: wrap;
    opacity: 0; animation: fade 0.6s ease 0.4s forwards;
  }
  .links a {
    font-family: var(--mono); font-size: 0.9rem; color: var(--ink);
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    transition: color 0.2s, gap 0.2s;
  }
  .links a .arrow { color: var(--accent); transition: transform 0.2s; }
  .links a:hover { color: var(--accent); }
  .links a:hover .arrow { transform: translateX(3px); }
  @keyframes fade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  ::selection { background: var(--accent); color: var(--bg); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 3px; }
  footer {
    position: absolute; bottom: 28px; left: 0; right: 0; z-index: 1; text-align: center;
    font-family: var(--mono); font-size: 0.75rem; color: #4a4a52;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="eyebrow">
		<span class="dot"></span>Work in Progress<span class="dot"></span>
		<br></br>
		<span></span>Check back shortly &mdash; or reach out in the meantime.
	</div>
    <!--
		<h1>Something <span class="hl">new</span> is being built.</h1>
	-->
    <!--
		<div class="terminal">
			<div class="line"><span class="prompt">$</span> git commit -m "portfolio v1"</div>
			<div class="line"><span class="comment"># deploying soon</span><span class="cursor"></span></div>
		</div>
    -->
	<!--
		<p class="sub">My new portfolio is under construction. </p>
	-->
    <div class="links">
      <a href="mailto:saurabhvyasonline@yahoo.com"><span class="arrow">&rarr;</span> saurabhvyasonline@yahoo.com</a>
      <!--
		<a href="https://github.com/yourusername"><span class="arrow">&rarr;</span> github</a>
	  -->
      <a href="https://linkedin.com/in/saurabhvyas1"><span class="arrow">&rarr;</span> linkedin</a>
    </div>
  </div>
  <footer>&copy; <span id="year"></span> Saurabh Vyas</footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
